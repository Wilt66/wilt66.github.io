<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="header.css" rel="stylesheet" type="text/css" media="all">
    <title>메할일</title>
</head>
<body>
    <header>
        <div class="head">메이플 숙제</div>
    </header>
    <main>
        <div class="week">주간 숙제
            <div class="week_Symbol">주간 심볼
                <div class="Elemental">
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 에르다 스펙트럼</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 배고픈 무토</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 미드나잇 체이서</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 스피릿 세이비어</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 엔하임 디펜스</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 프로텍트 에스페라</label>
                </div>    
            </div>
            <div class="week_Q">주간 할일
                <div class="Elemental">
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 헤이븐</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 타락한 세계수</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 크리티아스</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 주간보스</label>
                </div>    
            </div>
            <div class="week_Evnet">주간 이벤트
                <div class="Elemental">
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 코코넛 스매시 챌린지</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 티스크 트로피컬 어드벤처</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 티스크의 식량창고</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 이덴티스크 심화탐험</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 바람 주화 획득</label>
                </div>    
            </div>
        </div>
        <div class="daily">일일 숙제
            <div class="daily_Symbol">일일 심볼
                <div class="Elemental">
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 소멸의 여로<img src="1.png"></label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 츄츄 아일랜드<img src="2.png"></label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 레헬른<img src="3.png"></label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 아르카나<img src="4.png"></label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 모라스<img src="5.png"></label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 에스페라<img src="6.png"></label>
                </div>    
            </div>
            <div class="daily_Q">일일 할일
                <div class="Elemental">
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 우르스</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 일일 보스</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 몬스터파크</label>   
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 데일리기프트</label>
                    <label class="form-check-label form-check-inline"><input type="checkbox"/> 이덴티스크 기본탐험</label>
                    <div class="none"><label class="form-check-label form-check-inline"><input type="checkbox"/></label></div>
                </div>
            </div>
        </div>
    </main>
    <script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1/dist/es-module-shims.min.js" crossorigin="anonymous"></script>
</body>
</html>
