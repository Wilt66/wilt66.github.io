<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한능검 패스</title>
    <style>
        /* 1. 반응형 레이아웃 설정 (Flex) */
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            box-sizing: border-box; 
        }

        .container { 
            background: white; 
            width: 100%; 
            max-width: 600px; 
            padding: clamp(20px, 5vw, 40px); 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            text-align: center; 
        }

        .hidden { display: none; }
        h1 { color: #1a73e8; margin-bottom: 20px; font-size: clamp(1.5rem, 4vw, 2rem); }
        h3 { line-height: 1.5; word-break: keep-all; font-size: clamp(1.1rem, 3vw, 1.3rem); }

        /* 2. 버튼 그룹 (Flexbox) */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap; 
        }

        .btn { 
            flex: 1;
            min-width: 120px;
            padding: 14px 20px; 
            border: none; 
            border-radius: 12px; 
            background-color: #1a73e8; 
            color: white; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: 0.2s; 
        }
        .btn:hover { background-color: #1557b0; transform: translateY(-2px); }
        .btn.secondary { background-color: #5f6368; }

        /* 3. 리스트 및 이미지 스타일 */
        .option-list { text-align: left; margin: 25px 0; }
        .option-item { 
            display: flex; align-items: center; padding: 15px; 
            border: 1px solid #ddd; border-radius: 12px; 
            margin-bottom: 12px; cursor: pointer; transition: 0.2s; 
        }
        .option-item:hover { background-color: #f8f9fa; border-color: #1a73e8; }
        .option-item input { margin-right: 15px; width: 18px; height: 18px; cursor: pointer; }

        img { 
            width: 100%; height: auto; max-height: 350px; 
            object-fit: contain; border-radius: 10px; 
            margin: 15px 0; border: 1px solid #eee; 
        }

        /* 4. 결과 표 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; color: #555; }
        .status-o { color: #28a745; font-weight: bold; }
        .status-x { color: #d93025; font-weight: bold; }
        tr.clickable:hover { background-color: #f1f7ff; cursor: pointer; }

        /* 5. 모달(팝업) 상세 설정 - 버그 수정 반영 */
        .modal { 
            display: none; /* JS에서 flex로 변경함 */
            position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px); 
            align-items: center; /* 중앙 정렬 */
            justify-content: center; /* 중앙 정렬 */
        }
        .modal-content { 
            background: white; 
            padding: clamp(20px, 5vw, 30px); 
            width: 90%; 
            max-width: 500px; 
            border-radius: 20px; 
            position: relative; 
            max-height: 85vh; /* 화면 높이의 85% 제한 */
            overflow-y: auto; /* 내부 스크롤 허용 */
            text-align: left; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding-bottom: 40px; /* 닫기 버튼 아래 여유 공간 확보 */
        }
        .opt-correct { background-color: #d4edda !important; border: 2px solid #28a745 !important; }
        .opt-wrong { background-color: #f8d7da !important; border: 2px solid #dc3545 !important; }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            .btn { padding: 12px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen">
            <h1>한능검 패스</h1>
            <p style="color: #666; margin-bottom: 30px;">랜덤 20문제가 출제됩니다.</p>
            <button class="btn" onclick="startQuiz()">시험 시작하기</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="progress" style="font-weight:bold; color:#1a73e8; margin-bottom:10px;">문제 1 / 20</div>
            <h3 id="question-text">질문을 불러오는 중...</h3>
            <div id="image-container"></div>
            <div id="options" class="option-list"></div>
            <div class="button-group">
                <button class="btn secondary" id="prev-btn" onclick="goPrev()">이전</button>
                <button class="btn" id="next-btn" onclick="goNext()">다음</button>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>테스트 결과</h2>
            <h1 id="final-score" style="font-size: 3.5rem; color: #d93025; margin: 10px 0;">0점</h1>
            <p id="feedback-msg" style="margin-bottom: 25px; font-weight: 500;"></p>
            <div class="button-group">
                <button class="btn" onclick="location.reload()">다시 응시</button>
                <button class="btn secondary" id="review-btn" onclick="toggleReview()">오답 확인</button>
            </div>
            
            <div id="review-section" class="hidden">
                <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">* 리스트를 클릭하면 문제 내용을 확인합니다.</p>
                <table>
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>결과</th>
                            <th>정답 확인</th>
                        </tr>
                    </thead>
                    <tbody id="review-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0; color:#1a73e8; font-size: 1.2rem;">문제 상세 보기</h2>
            <div id="modal-body"></div>
            <button class="btn" style="width:100%; margin-top:30px;" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let selectedQuestions = [];
        let currentIdx = 0;
        let userAnswers = [];

        fetch('questions1.json')
            .then(res => res.json())
            .then(data => { allQuestions = data; })
            .catch(err => { alert("JSON 데이터를 불러올 수 없습니다."); });

        function startQuiz() {
            if (allQuestions.length === 0) return;
            selectedQuestions = allQuestions.sort(() => Math.random() - 0.5).slice(0, 20);
            userAnswers = new Array(selectedQuestions.length).fill(null);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = selectedQuestions[currentIdx];
            document.getElementById('progress').innerText = `문제 ${currentIdx + 1} / ${selectedQuestions.length}`;
            document.getElementById('question-text').innerText = q.question;
            const imgContainer = document.getElementById('image-container');
            imgContainer.innerHTML = q.image ? `<img src="${q.image}" alt="문제 이미지">` : "";

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            q.options.forEach((opt, i) => {
                const isChecked = userAnswers[currentIdx] === i ? 'checked' : '';
                optionsDiv.innerHTML += `
                    <label class="option-item">
                        <input type="radio" name="choice" value="${i}" ${isChecked} onchange="selectAnswer(${i})">
                        <span>${opt}</span>
                    </label>
                `;
            });

            document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = currentIdx === selectedQuestions.length - 1 ? '결과 제출' : '다음';
        }

        function selectAnswer(index) { userAnswers[currentIdx] = index; }

        function goNext() {
            if (userAnswers[currentIdx] === null) return alert("정답을 선택해 주세요!");
            if (currentIdx < selectedQuestions.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function goPrev() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        function showResult() {
            let correctCount = 0;
            const tableBody = document.getElementById('review-table-body');
            tableBody.innerHTML = ''; 

            userAnswers.forEach((ans, i) => {
                const q = selectedQuestions[i];
                const isCorrect = (ans === q.answer);
                if (isCorrect) correctCount++;

                const row = `
                    <tr class="clickable" onclick="showDetail(${i})">
                        <td>${i + 1}</td>
                        <td class="${isCorrect ? 'status-o' : 'status-x'}">${isCorrect ? 'O' : 'X'}</td>
                        <td style="text-align: left; font-size: 0.8rem;">
                            ${isCorrect ? '맞혔습니다' : `<span style="color:#d93025; font-weight:bold;">정답: ${q.options[q.answer]}</span>`}
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            const score = Math.round((100 / selectedQuestions.length) * correctCount);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}점`;
            document.getElementById('feedback-msg').innerText = score >= 80 ? "합격 안정권입니다!" : "오답 확인 후 다시 도전하세요!";
        }

        function showDetail(idx) {
            const q = selectedQuestions[idx];
            const userAns = userAnswers[idx];
            const modalBody = document.getElementById('modal-body');
            
            let html = `<p style="font-weight:bold; font-size:1.1rem; line-height:1.4;">${q.question}</p>`;
            if (q.image) html += `<img src="${q.image}">`;
            
            q.options.forEach((opt, i) => {
                let statusClass = "";
                if (i === q.answer) statusClass = "opt-correct";
                else if (i === userAns) statusClass = "opt-wrong";
                html += `<div class="option-item ${statusClass}" style="cursor:default;">${i+1}. ${opt}</div>`;
            });
            
            modalBody.innerHTML = html;
            const modal = document.getElementById('modal');
            modal.style.display = "flex"; // 중앙 정렬을 위해 flex 사용
            document.body.style.overflow = "hidden"; 
            document.querySelector('.modal-content').scrollTop = 0; // 모달 열 때 스크롤 상단으로
        }

        function closeModal() {
            document.getElementById('modal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        function toggleReview() {
            const section = document.getElementById('review-section');
            const btn = document.getElementById('review-btn');
            const isHidden = section.classList.toggle('hidden');
            btn.innerText = isHidden ? "오답 확인" : "결과 요약";
            if(!isHidden) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onclick = function(e) {
            if (e.target == document.getElementById('modal')) closeModal();
        }
    </script>
</body>
</html>
